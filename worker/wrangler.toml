name = "dmnew-leaderboard"
main = "src/index.js"
compatibility_date = "2024-09-23"

# KV namespace под таблицу лидеров.
# Создать: wrangler kv namespace create KV
# и вставить выданный id ниже.
kv_namespaces = [
  { binding = "KV", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

# Токен бота кладётся секретом, НЕ в этот файл:
#   wrangler secret put BOT_TOKEN
